name: DockerX Workflow
on:
  push:
    tags:
      - "*"
    branches-ignore:
      - none
  workflow_dispatch:
jobs:
  build:
    name: Build
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        config:
          - { dockerfile: "Dockerfile", context: "signatur", tag_name: "latest" }
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: true
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set tag name based on branch
        id: set_tag
        run: |
          if [[ "${{ github.ref_name }}" == "master" ]]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
          else
            ref_name=${{ github.ref_name }}
            BRANCH_NAME=${ref_name//\//_}
            echo "tag=$BRANCH_NAME" >> $GITHUB_OUTPUT
          fi
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.config.dockerfile }}
          platforms: linux/amd64,linux/arm64/v8
          push: true
          provenance: mode=max
          sbom: true
          tags: hivesolutions/signatur:${{ steps.set_tag.outputs.tag }}
  trigger-deploy:
    name: Trigger signatur-latest deployment
    needs: build
    if: github.event_name == 'push' && github.ref_name == 'master'
    runs-on: ubuntu-latest
    steps:
      - uses: hivesolutions/deploy-action@v1
        with:
          repository: hivesolutions/infra-bemisc
          service: signatur-latest
          group: apps
          tag: latest
          token: ${{ secrets.INFRA_DEPLOY_PAT }}
