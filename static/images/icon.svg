<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#6BB0E8"/>
            <stop offset="100%" stop-color="#3A6FA0"/>
        </linearGradient>
        <linearGradient id="s-fill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#FFFFFF"/>
            <stop offset="100%" stop-color="#D8E8F5"/>
        </linearGradient>
        <linearGradient id="engrave" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.05"/>
        </linearGradient>
    </defs>

    <!-- iOS squircle background -->
    <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

    <!-- subtle inner shadow for depth -->
    <rect x="4" y="4" width="504" height="504" rx="110" ry="110"
          fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="4"/>

    <!-- engraving lines (subtle diagonal hatching suggesting machined surface) -->
    <g opacity="0.06" stroke="#FFFFFF" stroke-width="1.5">
        <line x1="80" y1="420" x2="420" y2="80"/>
        <line x1="80" y1="460" x2="460" y2="80"/>
        <line x1="80" y1="500" x2="500" y2="80"/>
        <line x1="120" y1="500" x2="500" y2="120"/>
        <line x1="160" y1="500" x2="500" y2="160"/>
        <line x1="200" y1="500" x2="500" y2="200"/>
        <line x1="80" y1="380" x2="380" y2="80"/>
        <line x1="80" y1="340" x2="340" y2="80"/>
        <line x1="80" y1="300" x2="300" y2="80"/>
        <line x1="80" y1="260" x2="260" y2="80"/>
    </g>

    <!-- monospaced S using Courier New / monospace font -->
    <text x="256" y="390" text-anchor="middle"
          font-family="'Courier New', 'Courier', monospace"
          font-size="440" font-weight="bold"
          fill="url(#s-fill)">S</text>

    <!-- thin engraving detail offset of the S -->
    <text x="256" y="390" text-anchor="middle"
          font-family="'Courier New', 'Courier', monospace"
          font-size="440" font-weight="bold"
          fill="none" stroke="url(#engrave)" stroke-width="2">S</text>

    <!-- small diamond engraving tool mark at top-right of S -->
    <path d="M 340 120 L 348 112 L 356 120 L 348 128 Z"
          fill="#FFFFFF" opacity="0.45"/>

    <!-- subtle sparkle suggesting precision/engraving -->
    <g fill="#FFFFFF" opacity="0.35">
        <circle cx="356" cy="104" r="2"/>
        <circle cx="366" cy="116" r="1.5"/>
    </g>
</svg>
